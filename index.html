<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kuis Kimia Pagi</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#10b981",
            secondary: "#6366f1"
          }
        }
      }
    }
  </script>

  <style>
    body {
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn {
      transition: all 0.2s ease;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .fade-in {
      animation: fade 0.3s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-white min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

  <!-- BACKGROUND GLOW -->
  <div class="fixed top-0 left-0 w-96 h-96 bg-emerald-500/10 blur-3xl rounded-full"></div>
  <div class="fixed bottom-0 right-0 w-96 h-96 bg-indigo-500/10 blur-3xl rounded-full"></div>

  <div class="w-full max-w-xl relative z-10">

    <!-- HEADER -->
    <div class="mb-6">

      <h1 class="text-3xl font-bold text-center text-emerald-400">
        Kuis Kimia Pagi
      </h1>

      <p class="text-slate-400 text-center mt-2 text-sm">
        Setoran latihan hafalan unsur & senyawa setiap pagi =￣ω￣=
      </p>

      <!-- XP PANEL -->
      <div class="mt-5 bg-slate-800/70 backdrop-blur border border-slate-700 rounded-2xl p-4">

        <div class="flex items-center justify-between mb-3">

          <div>
            <p class="text-slate-400 text-sm">
              Rank Saat Ini
            </p>

            <h2
              id="rankText"
              class="text-2xl font-bold text-emerald-400">
              Student
            </h2>
          </div>

          <div class="text-right">
            <p class="text-slate-400 text-sm">
              Daily Streak
            </p>

            <div class="flex items-center gap-2 justify-end">

              <span
                id="streakFire"
                class="text-3xl grayscale">
                🔥
              </span>

              <span
                id="streakCount"
                class="text-xl font-bold">
                0
              </span>

            </div>

          </div>

        </div>

        <!-- XP BAR -->
        <div class="mb-2 flex justify-between text-sm text-slate-300">
          <span id="xpText">0 XP</span>
          <span>700 XP</span>
        </div>

        <div class="w-full bg-slate-700 rounded-full h-4 overflow-hidden">

          <div
            id="xpBar"
            class="bg-gradient-to-r from-emerald-400 to-indigo-500 h-4 rounded-full transition-all duration-500"
            style="width: 0%">
          </div>

        </div>

      </div>

    </div>

    <!-- MAIN CARD -->
    <div class="bg-slate-800/80 backdrop-blur rounded-3xl shadow-2xl p-5 border border-slate-700">

      <!-- WELCOME -->
      <div id="welcomeScreen" class="fade-in">

        <img
          src="images/welcome.png"
          class="w-full rounded-2xl mb-5 border border-slate-700"
        />

        <h2 class="text-2xl font-bold text-center text-emerald-400 mb-3">
          Selamat Pagi, Chemist! 💌☢
        </h2>

        <p class="text-slate-300 text-center leading-relaxed mb-6">
          Awali harimu dengan asupan kimia agar otak tetap tajam seperti ilmuwan sejati !!
        </p>

        <button
          onclick="startQuiz()"
          class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-4 rounded-2xl text-lg transition">
          Ayo Mulai
        </button>

      </div>

      <!-- QUIZ -->
      <div id="quizContainer" class="hidden fade-in">

        <!-- PROGRESS -->
        <div class="mb-5">

          <div class="flex justify-between text-sm mb-2 text-slate-300">
            <span id="progressText">Soal 1 dari 10</span>
            <span id="scoreText">Skor: 0</span>
          </div>

          <div class="w-full bg-slate-700 rounded-full h-3 overflow-hidden">

            <div
              id="progressBar"
              class="bg-gradient-to-r from-emerald-400 to-indigo-500 h-3 rounded-full transition-all duration-300"
              style="width: 10%">
            </div>

          </div>

        </div>

        <!-- QUESTION -->
        <h2
          id="question"
          class="text-xl font-semibold leading-relaxed mb-6 text-slate-100">
        </h2>

        <!-- OPTIONS -->
        <div id="options" class="grid gap-4"></div>

      </div>

      <!-- RESULT -->
      <div id="resultContainer" class="hidden text-center fade-in">

        <img
          id="resultImage"
          src=""
          class="w-full rounded-2xl mb-5 border border-slate-700"
        />

        <div class="text-6xl mb-4">
          🧪
        </div>

        <h2 class="text-3xl font-bold text-emerald-400 mb-3">
          Kuis Selesai!
        </h2>

        <p
          id="finalScore"
          class="text-5xl font-extrabold mb-4 text-white">
        </p>

        <p
          id="motivation"
          class="text-slate-300 mb-8 text-lg leading-relaxed">
        </p>

        <button
          onclick="startQuiz()"
          class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-4 rounded-2xl text-lg transition">
          Coba Tantangan Baru
        </button>

      </div>

    </div>

  </div>

  <script>

    // =========================
    // LOAD QUESTIONS
    // =========================

    let questionBank = [];

    async function loadQuestions() {

      try {

        const response =
          await fetch("questions.json");

        questionBank =
          await response.json();

        console.log(
          "Questions loaded:",
          questionBank.length
        );

      }

      catch (error) {

        console.error(
          "Gagal load questions:",
          error
        );

        alert(
          "Questions gagal dimuat!"
        );

      }

    }

    // =========================
    // VARIABLES
    // =========================

    let quizQuestions = [];
    let currentQuestion = 0;
    let score = 0;

    const TOTAL_QUESTIONS = 10;

    // =========================
    // LOCAL STORAGE
    // =========================

    let totalXP =
      Number(localStorage.getItem("chemXP")) || 0;

    let streak =
      Number(localStorage.getItem("chemStreak")) || 0;

    let lastPlayed =
      localStorage.getItem("lastPlayed") || "";

    let weeklyReset =
      localStorage.getItem("weeklyReset") || "";

    const today =
      new Date().toDateString();

    // =========================
    // ELEMENTS
    // =========================

    const questionEl =
      document.getElementById("question");

    const optionsEl =
      document.getElementById("options");

    const progressText =
      document.getElementById("progressText");

    const progressBar =
      document.getElementById("progressBar");

    const scoreText =
      document.getElementById("scoreText");

    const quizContainer =
      document.getElementById("quizContainer");

    const resultContainer =
      document.getElementById("resultContainer");

    const welcomeScreen =
      document.getElementById("welcomeScreen");

    const resultImage =
      document.getElementById("resultImage");

    const finalScore =
      document.getElementById("finalScore");

    const motivation =
      document.getElementById("motivation");

    const rankText =
      document.getElementById("rankText");

    const xpText =
      document.getElementById("xpText");

    const xpBar =
      document.getElementById("xpBar");

    const streakCount =
      document.getElementById("streakCount");

    const streakFire =
      document.getElementById("streakFire");

    // =========================
    // SAVE DATA
    // =========================

    function saveData() {

      localStorage.setItem(
        "chemXP",
        totalXP
      );

      localStorage.setItem(
        "chemStreak",
        streak
      );

      localStorage.setItem(
        "lastPlayed",
        lastPlayed
      );

      localStorage.setItem(
        "weeklyReset",
        weeklyReset
      );

    }

    // =========================
    // WEEK NUMBER
    // =========================

    function getWeekNumber(date) {

      const firstJan =
        new Date(date.getFullYear(), 0, 1);

      const days =
        Math.floor(
          (date - firstJan) /
          (24 * 60 * 60 * 1000)
        );

      return Math.ceil(
        (days + firstJan.getDay() + 1) / 7
      );

    }

    // =========================
    // UPDATE RANK
    // =========================

    function updateRankUI() {

      const now = new Date();

      const currentWeek =
        `${now.getFullYear()}-${getWeekNumber(now)}`;

      // FIRST SETUP
      if (weeklyReset === "") {

        weeklyReset =
          currentWeek;

        saveData();

      }

      // WEEKLY RESET
      else if (
        weeklyReset !== currentWeek
      ) {

        totalXP = 0;

        streak = 0;

        weeklyReset =
          currentWeek;

        saveData();

      }

      // RANK
      let rank = "Student";

      if (totalXP >= 560) {

        rank = "Professor";

      }

      else if (totalXP >= 490) {

        rank = "Alchemist";

      }

      else if (totalXP >= 350) {

        rank = "Chemist";

      }

      rankText.textContent =
        rank;

      // XP
      xpText.textContent =
        `${totalXP} XP`;

      const xpPercent =
        Math.min(
          (totalXP / 700) * 100,
          100
        );

      xpBar.style.width =
        `${xpPercent}%`;

      // STREAK
      streakCount.textContent =
        streak;

      if (lastPlayed === today) {

        streakFire.classList.remove(
          "grayscale"
        );

      }

      else {

        streakFire.classList.add(
          "grayscale"
        );

      }

    }

    // =========================
    // SHUFFLE
    // =========================

    function shuffle(array) {

      return [...array]
        .sort(() => Math.random() - 0.5);

    }

    // =========================
    // START QUIZ
    // =========================

    function startQuiz() {

      if (
        questionBank.length === 0
      ) {

        alert(
          "Questions belum selesai dimuat!"
        );

        return;

      }

      welcomeScreen.classList.add(
        "hidden"
      );

      currentQuestion = 0;

      score = 0;

      quizQuestions =
        shuffle(questionBank)
        .slice(0, TOTAL_QUESTIONS);

      quizContainer.classList.remove(
        "hidden"
      );

      resultContainer.classList.add(
        "hidden"
      );

      loadQuestion();

    }

    // =========================
    // LOAD QUESTION
    // =========================

    function loadQuestion() {

      const q =
        quizQuestions[currentQuestion];

      questionEl.textContent =
        q.q;

      progressText.textContent =
        `Soal ${currentQuestion + 1} dari ${TOTAL_QUESTIONS}`;

      scoreText.textContent =
        `Skor: ${score}`;

      progressBar.style.width =
        `${((currentQuestion + 1) / TOTAL_QUESTIONS) * 100}%`;

      optionsEl.innerHTML = "";

      const allOptions =
        shuffle([q.a, ...q.o]);

      allOptions.forEach(option => {

        const btn =
          document.createElement("button");

        btn.textContent =
          option;

        btn.className =
          "option-btn w-full bg-slate-700 hover:bg-slate-600 border border-slate-600 text-left py-4 px-4 rounded-2xl text-base font-medium";

        btn.onclick =
          () => selectAnswer(
            btn,
            option,
            q.a
          );

        optionsEl.appendChild(btn);

      });

    }

    // =========================
    // SELECT ANSWER
    // =========================

    function selectAnswer(
      button,
      selected,
      correct
    ) {

      const buttons =
        document.querySelectorAll(".option-btn");

      buttons.forEach(btn => {

        btn.disabled = true;

        // CORRECT
        if (
          btn.textContent === correct
        ) {

          btn.classList.remove(
            "bg-slate-700"
          );

          btn.classList.add(
            "bg-emerald-500",
            "text-slate-900"
          );

        }

        // WRONG
        if (
          btn.textContent === selected &&
          selected !== correct
        ) {

          btn.classList.remove(
            "bg-slate-700"
          );

          btn.classList.add(
            "bg-red-500",
            "text-white"
          );

        }

      });

      // SCORE
      if (selected === correct) {

        score += 10;

        scoreText.textContent =
          `Skor: ${score}`;

      }

      setTimeout(() => {

        currentQuestion++;

        if (
          currentQuestion < TOTAL_QUESTIONS
        ) {

          loadQuestion();

        }

        else {

          showResult();

        }

      }, 1000);

    }

    // =========================
    // RESULT
    // =========================

    function showResult() {

      quizContainer.classList.add(
        "hidden"
      );

      resultContainer.classList.remove(
        "hidden"
      );

      finalScore.textContent =
        `${score}/100`;

      // STREAK RESET CHECK
      const yesterday =
        new Date();

      yesterday.setDate(
        yesterday.getDate() - 1
      );

      if (
        lastPlayed !== "" &&
        lastPlayed !== today &&
        lastPlayed !== yesterday.toDateString()
      ) {

        streak = 0;

      }

      // ONLY FIRST PLAY TODAY
      if (lastPlayed !== today) {

        totalXP += score;

        streak++;

        lastPlayed = today;

        saveData();

      }

      updateRankUI();

      let message = "";

      // 100
      if (score === 100) {

        message =
          "Luar biasa! Pagi ini otak kimiamu benar-benar bersinar seperti emas murni. ✨";

        resultImage.src =
          "images/perfect.png";

      }

      // 80
      else if (score >= 80) {

        message =
          "Hebat! Hafalan kimiamu sudah sangat kuat. Pertahankan rutinitas pagimu! 🌞";

        resultImage.src =
          "images/great.png";

      }

      // 50
      else if (score >= 50) {

        message =
          "Bagus! Sedikit lagi menuju master kimia pagi hari. Tetap konsisten ya! 🧪";

        resultImage.src =
          "images/good.png";

      }

      // 30
      else if (score >= 30) {

        message =
          "Tidak buruk! Setiap pagi adalah kesempatan baru untuk berkembang. 💡";

        resultImage.src =
          "images/bad.png";

      }

      // BELOW 30
      else {

        message =
          "Semangat! Bahkan ilmuwan hebat juga belajar sedikit demi sedikit setiap hari. 🚀";

        resultImage.src =
          "images/sad.png";

      }

      motivation.textContent =
        message;

    }

    // =========================
    // INITIAL LOAD
    // =========================

    window.onload = async () => {

      updateRankUI();

      await loadQuestions();

    }

  </script>

</body>

</html>
